- # ====== Computation: P110_INVOICE_NUMBER ====================
  id: 79256658605559802
  identification: 
    item-name: P110_INVOICE_NUMBER

  execution: 
    sequence: 10
    point: Before Regions

  computation: 
    type: SQL Query (return single value)
    sql-query: |
      select nvl(max(invoice_number),0) + 1
        from invg_invoices

